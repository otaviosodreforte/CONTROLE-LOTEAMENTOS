<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Loteamentos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a237e; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,.2); width: 360px; }
        h1 { text-align: center; color: #1a237e; margin-bottom: 24px; font-size: 24px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 13px; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
        button { width: 100%; padding: 12px; background: #1a237e; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #283593; }
        .erro { background: #ffebee; color: #c62828; padding: 12px; border-radius: 6px; margin-bottom: 16px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🏗️ Loteamentos</h1>
        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        <form method="POST">
            <label>Usuário</label>
            <input type="text" name="username" required autofocus>
            <label>Senha</label>
            <input type="password" name="password" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
